<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lista de Compras</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">

<!-- Firebase (sincronização em tempo real entre dispositivos) -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<style>
  :root{
    --paper: #EFE3C8;
    --paper-dark: #E4D5AE;
    --paper-light: #F7F0DD;
    --chalkboard: #26332A;
    --chalkboard-2: #32412F;
    --ink: #2E2417;
    --ink-soft: #6B5D46;
    --tomato: #B23A2E;
    --tomato-dark: #8F2E24;
    --mustard: #D9A62E;
    --olive: #55643E;
    --olive-dark: #445033;
    --line: #C7B48A;
    --chalk: #F3ECD9;
    --radius: 12px;
    --shadow-sm: 0 1px 3px rgba(46,36,23,0.12);
    --shadow-md: 0 6px 18px rgba(46,36,23,0.14);
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:
      radial-gradient(ellipse 900px 500px at 15% -10%, rgba(255,255,255,0.35), transparent 60%),
      radial-gradient(ellipse 700px 500px at 100% 0%, rgba(217,166,46,0.10), transparent 55%),
      var(--paper);
    background-attachment: fixed;
    color:var(--ink);
    font-family:'Inter', sans-serif;
    min-height:100vh;
    padding-bottom:70px;
  }
  .wrap{
    max-width:1000px;
    margin:0 auto;
    padding:0 16px;
  }

  /* HEADER */
  header.board{
    background:linear-gradient(180deg,var(--chalkboard),var(--chalkboard-2));
    padding:24px 0 28px;
    margin-bottom:24px;
    border-bottom:6px solid var(--ink);
    box-shadow:0 4px 0 var(--line), var(--shadow-md);
    position:relative;
    overflow:hidden;
  }
  header.board::after{
    content:'';
    position:absolute; inset:0;
    background:
      repeating-linear-gradient(0deg, rgba(255,255,255,0.015) 0px, rgba(255,255,255,0.015) 1px, transparent 1px, transparent 3px);
    pointer-events:none;
  }
  header.board .wrap{display:flex; flex-direction:column; gap:12px; position:relative; z-index:1;}
  .title-row{display:flex; align-items:baseline; justify-content:space-between; flex-wrap:wrap; gap:8px;}
  h1{
    font-family:'Caveat', cursive;
    font-size:2.8rem;
    font-weight:700;
    color:var(--chalk);
    margin:0;
    letter-spacing:0.5px;
    transform:rotate(-1deg);
    text-shadow:0 2px 0 rgba(0,0,0,0.15);
  }
  .header-tags{display:flex; gap:8px; align-items:center; flex-wrap:wrap;}
  .date-tag, .sync-tag{
    font-family:'JetBrains Mono', monospace;
    font-size:0.72rem;
    padding:4px 11px;
    border-radius:20px;
    border:1px solid rgba(217,166,46,0.4);
    white-space:nowrap;
  }
  .date-tag{color:var(--mustard); background:rgba(0,0,0,0.25);}
  .sync-tag{color:var(--chalk); background:rgba(85,100,62,0.55); border-color:rgba(163,190,130,0.4); display:flex; align-items:center; gap:5px;}
  .sync-dot{width:7px; height:7px; border-radius:50%; background:#8fd17a; box-shadow:0 0 6px #8fd17a;}
  .sync-dot.offline{background:#d1a97a; box-shadow:0 0 6px #d1a97a;}
  .progress-row{display:flex; align-items:center; gap:12px;}
  .progress-track{
    flex:1;
    height:11px;
    background:rgba(255,255,255,0.12);
    border-radius:20px;
    overflow:hidden;
    box-shadow:inset 0 1px 3px rgba(0,0,0,0.3);
  }
  .progress-fill{
    height:100%;
    background:linear-gradient(90deg, var(--mustard), #eec564);
    width:0%;
    transition:width 0.4s ease;
    border-radius:20px;
  }
  .progress-label{
    font-family:'JetBrains Mono', monospace;
    font-size:0.8rem;
    color:var(--chalk);
    white-space:nowrap;
  }

  /* ADD BAR */
  .add-bar{
    position:sticky;
    top:10px;
    z-index:20;
    background:var(--paper-light);
    border:1px solid var(--line);
    border-radius:var(--radius);
    padding:14px;
    margin-bottom:22px;
    box-shadow:var(--shadow-md);
  }
  .add-row{
    display:flex;
    gap:8px;
    flex-wrap:wrap;
  }
  .add-row input[type=text], .add-row input[type=number], .add-row select{
    font-family:'Inter',sans-serif;
    font-size:0.92rem;
    padding:10px 12px;
    border:1px solid var(--line);
    border-radius:8px;
    background:var(--paper);
    color:var(--ink);
    outline:none;
    transition:border-color 0.15s, box-shadow 0.15s;
  }
  .add-row input[type=text]:focus, .add-row input[type=number]:focus, .add-row select:focus{
    border-color:var(--olive);
    box-shadow:0 0 0 3px rgba(85,100,62,0.15);
  }
  #item-name{flex:1 1 180px; min-width:140px;}
  #item-qty{width:70px; font-family:'JetBrains Mono', monospace;}
  #item-unit{width:80px;}
  #item-cat{flex:0 0 auto; min-width:140px;}
  .btn{
    font-family:'Inter',sans-serif;
    font-weight:600;
    font-size:0.9rem;
    padding:10px 18px;
    border-radius:8px;
    border:none;
    cursor:pointer;
    transition:transform 0.1s ease, filter 0.15s ease, box-shadow 0.15s ease;
  }
  .btn:active{transform:scale(0.96);}
  .btn-primary{background:var(--olive); color:var(--chalk); box-shadow:0 2px 0 var(--olive-dark);}
  .btn-primary:hover{filter:brightness(1.08);}
  .btn-primary:active{box-shadow:none; transform:translateY(2px) scale(0.98);}
  .btn-ghost{
    background:transparent;
    color:var(--ink-soft);
    border:1px dashed var(--line);
  }
  .btn-ghost:hover{color:var(--ink); border-color:var(--ink-soft); background:rgba(0,0,0,0.02);}
  .btn-danger{background:var(--tomato); color:var(--chalk); box-shadow:0 2px 0 var(--tomato-dark);}
  .btn-danger:hover{filter:brightness(1.08);}
  .btn-danger:active{box-shadow:none; transform:translateY(2px) scale(0.98);}

  .quick-add{
    margin-top:11px;
    display:flex;
    gap:6px;
    flex-wrap:wrap;
  }
  .chip{
    font-family:'Inter',sans-serif;
    font-size:0.78rem;
    color:var(--ink-soft);
    background:var(--paper);
    border:1px solid var(--line);
    padding:5px 12px;
    border-radius:20px;
    cursor:pointer;
    transition:background 0.15s, color 0.15s;
  }
  .chip:hover{background:var(--paper-dark); color:var(--ink);}

  .new-cat-row{display:none; gap:8px; margin-top:10px;}
  .new-cat-row.show{display:flex; flex-wrap:wrap;}

  /* GRID */
  .grid{
    display:grid;
    grid-template-columns:repeat(auto-fill, minmax(300px, 1fr));
    gap:18px;
  }
  .category-card{
    background:var(--paper-light);
    border:1px solid var(--line);
    border-radius:var(--radius);
    padding:16px 16px 8px;
    border-top:5px solid var(--olive);
    display:flex;
    flex-direction:column;
    min-height:130px;
    box-shadow:var(--shadow-sm);
    transition:box-shadow 0.2s;
  }
  .category-card:hover{box-shadow:var(--shadow-md);}
  .cat-header{
    display:flex;
    align-items:center;
    justify-content:space-between;
    margin-bottom:10px;
  }
  .cat-name{
    font-family:'Caveat', cursive;
    font-size:1.65rem;
    font-weight:700;
    color:var(--ink);
  }
  .cat-count{
    font-family:'JetBrains Mono', monospace;
    font-size:0.72rem;
    color:var(--ink-soft);
    background:var(--paper);
    padding:2px 9px;
    border-radius:20px;
    border:1px solid var(--line);
  }
  .cat-del{
    background:none; border:none; cursor:pointer;
    color:var(--ink-soft); font-size:0.9rem; opacity:0.45;
    margin-left:5px;
  }
  .cat-del:hover{opacity:1; color:var(--tomato);}

  .item-row{
    display:flex;
    align-items:center;
    gap:9px;
    padding:8px 4px;
    border-bottom:1px solid rgba(199,180,138,0.5);
    position:relative;
  }
  .item-row:last-child{border-bottom:none;}
  .checkbox{
    width:23px; height:23px;
    border-radius:50%;
    border:2px solid var(--olive);
    flex:0 0 auto;
    cursor:pointer;
    display:flex; align-items:center; justify-content:center;
    background:var(--paper);
    transition:background 0.15s;
  }
  .checkbox svg{width:13px; height:13px; opacity:0; transition:opacity 0.15s;}
  .item-row.checked .checkbox{background:var(--olive);}
  .item-row.checked .checkbox svg{opacity:1;}

  .item-thumb{
    width:36px; height:36px;
    border-radius:8px;
    flex:0 0 auto;
    cursor:pointer;
    border:1px solid var(--line);
    background:var(--paper) center/cover no-repeat;
    display:flex; align-items:center; justify-content:center;
    color:var(--ink-soft);
    position:relative;
    overflow:hidden;
    transition:transform 0.15s, border-color 0.15s;
  }
  .item-thumb:hover{border-color:var(--olive); transform:scale(1.05);}
  .item-thumb svg{width:16px; height:16px; opacity:0.55;}
  .item-thumb .remove-img{
    position:absolute; top:-2px; right:-2px;
    width:15px; height:15px;
    background:var(--tomato); color:white;
    border-radius:50%;
    font-size:9px;
    display:none;
    align-items:center; justify-content:center;
    line-height:1;
  }
  .item-thumb.has-img:hover .remove-img{display:flex;}

  .item-name{
    flex:1;
    font-size:0.94rem;
    border:none;
    background:transparent;
    color:var(--ink);
    padding:4px 2px;
    font-family:'Inter',sans-serif;
    outline:none;
    min-width:0;
  }
  .item-row.checked .item-name{
    text-decoration:line-through;
    color:var(--ink-soft);
  }
  .item-qty{
    width:52px;
    font-family:'JetBrains Mono', monospace;
    font-size:0.8rem;
    text-align:center;
    border:1px solid transparent;
    background:transparent;
    color:var(--ink-soft);
    border-radius:6px;
    padding:3px 2px;
    outline:none;
  }
  .item-qty:focus{border-color:var(--line); background:var(--paper);}
  .item-del{
    background:none; border:none; cursor:pointer;
    color:var(--ink-soft); opacity:0.4; font-size:1rem;
    flex:0 0 auto; line-height:1;
  }
  .item-del:hover{opacity:1; color:var(--tomato);}

  .stamp{
    position:absolute;
    right:78px;
    font-family:'JetBrains Mono', monospace;
    font-weight:700;
    font-size:0.6rem;
    letter-spacing:1px;
    color:var(--tomato);
    border:2px solid var(--tomato);
    border-radius:4px;
    padding:1px 5px;
    transform:rotate(-8deg) scale(0);
    opacity:0;
    pointer-events:none;
    background:rgba(178,58,46,0.06);
    transition:transform 0.25s cubic-bezier(.34,1.56,.64,1), opacity 0.2s;
  }
  .item-row.checked .stamp{
    transform:rotate(-8deg) scale(1);
    opacity:0.85;
  }

  .empty-cat{
    font-size:0.82rem;
    color:var(--ink-soft);
    font-style:italic;
    padding:10px 4px;
    opacity:0.7;
  }

  /* LIGHTBOX */
  .lightbox{
    position:fixed; inset:0;
    background:rgba(20,16,10,0.85);
    display:none;
    align-items:center; justify-content:center;
    z-index:100;
    padding:24px;
  }
  .lightbox.show{display:flex;}
  .lightbox img{
    max-width:100%; max-height:85vh;
    border-radius:10px;
    box-shadow:0 10px 40px rgba(0,0,0,0.5);
    border:4px solid var(--chalk);
  }
  .lightbox-close{
    position:absolute; top:20px; right:24px;
    color:var(--chalk); font-size:2rem;
    background:none; border:none; cursor:pointer;
    line-height:1;
  }

  /* FOOTER */
  .footer-bar{
    max-width:1000px;
    margin:28px auto 0;
    padding:14px 16px 0;
    display:flex;
    justify-content:space-between;
    align-items:center;
    flex-wrap:wrap;
    gap:10px;
    border-top:2px dashed var(--line);
  }
  .receipt-total{
    font-family:'JetBrains Mono', monospace;
    font-size:0.85rem;
    color:var(--ink-soft);
  }
  .receipt-total b{color:var(--ink);}
  .footer-actions{display:flex; gap:8px; flex-wrap:wrap;}

  .save-indicator{
    position:fixed;
    bottom:16px;
    right:16px;
    font-family:'JetBrains Mono', monospace;
    font-size:0.72rem;
    color:var(--chalk);
    background:var(--chalkboard);
    padding:7px 14px;
    border-radius:20px;
    opacity:0;
    transform:translateY(6px);
    transition:opacity 0.25s, transform 0.25s;
    pointer-events:none;
    box-shadow:var(--shadow-md);
  }
  .save-indicator.show{opacity:0.92; transform:translateY(0);}

  .loading-state{
    text-align:center;
    padding:60px 20px;
    color:var(--ink-soft);
    font-family:'Inter',sans-serif;
  }

  /* MOBILE */
  @media (max-width:640px){
    h1{font-size:2.2rem;}
    .add-bar{padding:11px; top:6px;}
    #item-cat{min-width:100%;}
    #item-name{min-width:100%;}
    .grid{grid-template-columns:1fr;}
    .footer-bar{flex-direction:column; align-items:flex-start;}
    .stamp{right:70px;}
  }
</style>
</head>
<body>

<header class="board">
  <div class="wrap">
    <div class="title-row">
      <h1>Lista de Compras</h1>
      <div class="header-tags">
        <span class="sync-tag" id="sync-tag"><span class="sync-dot" id="sync-dot"></span><span id="sync-text">conectando…</span></span>
        <span class="date-tag" id="date-tag"></span>
      </div>
    </div>
    <div class="progress-row">
      <div class="progress-track"><div class="progress-fill" id="progress-fill"></div></div>
      <span class="progress-label" id="progress-label">0 / 0</span>
    </div>
  </div>
</header>

<div class="wrap">

  <div class="add-bar">
    <div class="add-row">
      <input type="text" id="item-name" placeholder="Nome do item (ex: tomate)" maxlength="60">
      <input type="number" id="item-qty" placeholder="Qtd" min="0" step="1" value="1">
      <input type="text" id="item-unit" placeholder="un/kg/L" maxlength="8">
      <select id="item-cat"></select>
      <button class="btn btn-primary" id="add-item-btn">+ Adicionar</button>
    </div>
    <div class="quick-add" id="quick-add"></div>
    <div style="margin-top:11px;">
      <button class="btn btn-ghost" id="show-new-cat">+ Nova categoria</button>
    </div>
    <div class="new-cat-row" id="new-cat-row">
      <input type="text" id="new-cat-name" placeholder="Nome da categoria" maxlength="30">
      <button class="btn btn-primary" id="add-cat-btn">Criar</button>
    </div>
  </div>

  <div id="content">
    <div class="loading-state">Carregando sua lista…</div>
  </div>

</div>

<div class="footer-bar">
  <div class="receipt-total" id="receipt-total"></div>
  <div class="footer-actions">
    <button class="btn btn-ghost" id="clear-checked-btn">Limpar comprados</button>
    <button class="btn btn-danger" id="clear-all-btn">Limpar tudo</button>
  </div>
</div>

<div class="save-indicator" id="save-indicator">salvo ✓</div>

<div class="lightbox" id="lightbox">
  <button class="lightbox-close" id="lightbox-close">&times;</button>
  <img id="lightbox-img" src="" alt="Foto do item">
</div>

<!-- input de arquivo escondido, reutilizado para qualquer item -->
<input type="file" id="file-input" accept="image/*" capture="environment" style="display:none;">

<script>
/* =========================================================
   CONFIGURAÇÃO DO FIREBASE
   -----------------------------------------------------------
   1. Vá em https://console.firebase.google.com → crie um projeto (grátis)
   2. No projeto: Build → Firestore Database → Create database → modo "test" (ou produção com as regras abaixo)
   3. Vá em Configurações do projeto (ícone de engrenagem) → role até "Seus apps" → clique no ícone "</>" (Web) → registre o app
   4. Copie o objeto firebaseConfig gerado e cole substituindo o objeto abaixo
   5. Em Firestore Database → Regras, cole:

      rules_version = '2';
      service cloud.firestore {
        match /databases/{database}/documents {
          match /listas/{doc} {
            allow read, write: if true;
          }
        }
      }

   Atenção: com essas regras, qualquer pessoa com o link do site pode
   ler e editar a lista — é o esperado para uma lista compartilhada
   entre família/amigos, mas não use para dados sensíveis.
========================================================= */
const firebaseConfig = {
  apiKey: "COLE_AQUI",
  authDomain: "COLE_AQUI.firebaseapp.com",
  projectId: "COLE_AQUI",
  storageBucket: "COLE_AQUI.appspot.com",
  messagingSenderId: "COLE_AQUI",
  appId: "COLE_AQUI"
};
const DOC_PATH = { collection: 'listas', id: 'lista-principal' }; // pode trocar 'lista-principal' se quiser várias listas separadas

(function(){
  const STORAGE_KEY = 'grocery-list-v2';
  const DEFAULT_CATEGORIES = ['Hortifruti','Açougue','Padaria','Laticínios','Mercearia','Bebidas','Limpeza','Higiene','Outros'];
  const QUICK_ADD = ['Arroz','Feijão','Leite','Ovos','Pão','Café','Açúcar','Óleo','Papel higiênico','Detergente','Banana','Frango'];
  const CAT_COLORS = ['#55643E','#B23A2E','#D9A62E','#3E6B63','#6B4A63','#46586B','#8A6D3B','#4C6444','#7A4A3A'];
  const MAX_IMG_DIM = 480;
  const IMG_QUALITY = 0.6;

  let state = null;
  let saveTimer = null;
  let db = null;
  let docRef = null;
  let firebaseReady = false;
  let applyingRemote = false;
  let pendingImageItemId = null;

  function uid(){ return Date.now().toString(36) + Math.random().toString(36).slice(2,7); }

  function defaultState(){
    return {
      categories: DEFAULT_CATEGORIES.map(name => ({ id: uid(), name, items: [] }))
    };
  }

  function setSyncStatus(online, text){
    document.getElementById('sync-dot').classList.toggle('offline', !online);
    document.getElementById('sync-text').textContent = text;
  }

  /* ---------- Firebase setup ---------- */
  function initFirebase(){
    if(firebaseConfig.apiKey === 'COLE_AQUI'){
      setSyncStatus(false, 'sem sincronização (config pendente)');
      return false;
    }
    try{
      firebase.initializeApp(firebaseConfig);
      db = firebase.firestore();
      docRef = db.collection(DOC_PATH.collection).doc(DOC_PATH.id);
      return true;
    }catch(e){
      console.error('Erro ao iniciar Firebase', e);
      setSyncStatus(false, 'erro de conexão');
      return false;
    }
  }

  async function loadInitialState(){
    if(firebaseReady){
      try{
        const snap = await docRef.get();
        if(snap.exists && snap.data() && snap.data().payload){
          return JSON.parse(snap.data().payload);
        }
        const fresh = defaultState();
        await docRef.set({ payload: JSON.stringify(fresh), updatedAt: Date.now() });
        return fresh;
      }catch(e){
        console.error('Erro ao carregar do Firebase', e);
        setSyncStatus(false, 'sem conexão');
      }
    }
    try{
      const raw = localStorage.getItem(STORAGE_KEY);
      return raw ? JSON.parse(raw) : defaultState();
    }catch(e){
      return defaultState();
    }
  }

  function listenRemote(){
    if(!firebaseReady) return;
    docRef.onSnapshot(snap => {
      if(!snap.exists) return;
      const data = snap.data();
      if(!data || !data.payload) return;
      // ignora o eco da própria escrita local (evita "pulos" enquanto digita)
      if(snap.metadata.hasPendingWrites) return;
      try{
        state = JSON.parse(data.payload);
        applyingRemote = true;
        render();
        applyingRemote = false;
        setSyncStatus(true, 'sincronizado');
      }catch(e){ /* ignora payload inválido */ }
    }, err => {
      console.error('Erro de sincronização', err);
      setSyncStatus(false, 'sem conexão');
    });
  }

  function scheduleSave(){
    const indicator = document.getElementById('save-indicator');
    clearTimeout(saveTimer);
    saveTimer = setTimeout(async () => {
      try{
        if(firebaseReady){
          await docRef.set({ payload: JSON.stringify(state), updatedAt: Date.now() });
          setSyncStatus(true, 'sincronizado');
        }else{
          localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
        }
        indicator.classList.add('show');
        setTimeout(()=>indicator.classList.remove('show'), 1200);
      }catch(e){
        console.error('Erro ao salvar', e);
        setSyncStatus(false, 'falha ao salvar');
      }
    }, 350);
  }

  function catColor(index){ return CAT_COLORS[index % CAT_COLORS.length]; }

  function formatDate(){
    const d = new Date();
    return d.toLocaleDateString('pt-BR', { weekday:'short', day:'2-digit', month:'short' });
  }

  function populateCatSelect(){
    const sel = document.getElementById('item-cat');
    const current = sel.value;
    sel.innerHTML = state.categories.map(c => `<option value="${c.id}">${escapeHtml(c.name)}</option>`).join('');
    if(current) sel.value = current;
  }

  function escapeHtml(str){
    const div = document.createElement('div');
    div.textContent = str == null ? '' : str;
    return div.innerHTML;
  }

  function renderQuickAdd(){
    const el = document.getElementById('quick-add');
    el.innerHTML = QUICK_ADD.map(name => `<span class="chip" data-name="${escapeHtml(name)}">${escapeHtml(name)}</span>`).join('');
    el.querySelectorAll('.chip').forEach(chip => {
      chip.addEventListener('click', () => {
        document.getElementById('item-name').value = chip.dataset.name;
        document.getElementById('item-name').focus();
      });
    });
  }

  const thumbIconSvg = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="5" width="18" height="14" rx="2"></rect><circle cx="9" cy="10" r="1.5" fill="currentColor" stroke="none"></circle><path d="M21 16l-5.5-5.5L5 21"></path></svg>`;

  function render(){
    populateCatSelect();

    const content = document.getElementById('content');
    let totalItems = 0, checkedItems = 0;
    state.categories.forEach(c => { totalItems += c.items.length; checkedItems += c.items.filter(i=>i.checked).length; });

    document.getElementById('progress-label').textContent = `${checkedItems} / ${totalItems}`;
    document.getElementById('progress-fill').style.width = totalItems ? `${(checkedItems/totalItems)*100}%` : '0%';
    document.getElementById('receipt-total').innerHTML = totalItems
      ? `<b>${totalItems - checkedItems}</b> item(ns) restante(s) de <b>${totalItems}</b> no total`
      : 'Sua lista está vazia. Adicione o primeiro item acima.';

    if(state.categories.length === 0){
      content.innerHTML = '<div class="loading-state">Nenhuma categoria ainda. Crie uma acima.</div>';
      return;
    }

    content.innerHTML = `<div class="grid">${state.categories.map((cat, idx) => `
      <div class="category-card" style="border-top-color:${catColor(idx)}" data-cat-id="${cat.id}">
        <div class="cat-header">
          <span class="cat-name">${escapeHtml(cat.name)}</span>
          <span style="display:flex; align-items:center;">
            <span class="cat-count">${cat.items.filter(i=>i.checked).length}/${cat.items.length}</span>
            <button class="cat-del" data-del-cat="${cat.id}" title="Excluir categoria">✕</button>
          </span>
        </div>
        ${cat.items.length === 0
          ? '<div class="empty-cat">Nenhum item aqui ainda.</div>'
          : cat.items.map(item => `
            <div class="item-row ${item.checked ? 'checked' : ''}" data-item-id="${item.id}">
              <div class="checkbox" data-toggle="${item.id}">
                <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
              </div>
              <div class="item-thumb ${item.image ? 'has-img' : ''}" data-thumb="${item.id}" style="${item.image ? `background-image:url('${item.image}')` : ''}" title="${item.image ? 'Ver/trocar foto' : 'Adicionar foto de referência'}">
                ${item.image ? `<span class="remove-img" data-remove-img="${item.id}">✕</span>` : thumbIconSvg}
              </div>
              <input type="text" class="item-name" value="${escapeHtml(item.name)}" data-edit-name="${item.id}">
              <span class="stamp">OK</span>
              <input type="text" class="item-qty" value="${escapeHtml(item.qty || '')}" placeholder="qtd" data-edit-qty="${item.id}">
              <button class="item-del" data-del-item="${item.id}" title="Remover item">✕</button>
            </div>
          `).join('')
        }
      </div>
    `).join('')}</div>`;

    attachRowEvents();
  }

  function attachRowEvents(){
    document.querySelectorAll('[data-toggle]').forEach(el => {
      el.addEventListener('click', () => {
        const id = el.dataset.toggle;
        const item = findItem(id);
        if(item){ item.checked = !item.checked; render(); scheduleSave(); }
      });
    });
    document.querySelectorAll('[data-edit-name]').forEach(el => {
      el.addEventListener('change', () => {
        const item = findItem(el.dataset.editName);
        if(item){ item.name = el.value.trim() || item.name; scheduleSave(); }
      });
    });
    document.querySelectorAll('[data-edit-qty]').forEach(el => {
      el.addEventListener('change', () => {
        const item = findItem(el.dataset.editQty);
        if(item){ item.qty = el.value.trim(); scheduleSave(); }
      });
    });
    document.querySelectorAll('[data-del-item]').forEach(el => {
      el.addEventListener('click', () => {
        const id = el.dataset.delItem;
        state.categories.forEach(c => { c.items = c.items.filter(i => i.id !== id); });
        render(); scheduleSave();
      });
    });
    document.querySelectorAll('[data-del-cat]').forEach(el => {
      el.addEventListener('click', () => {
        const id = el.dataset.delCat;
        const cat = state.categories.find(c => c.id === id);
        if(cat && cat.items.length > 0){
          if(!confirm(`A categoria "${cat.name}" tem ${cat.items.length} item(ns). Excluir mesmo assim?`)) return;
        }
        state.categories = state.categories.filter(c => c.id !== id);
        render(); scheduleSave();
      });
    });
    document.querySelectorAll('[data-thumb]').forEach(el => {
      el.addEventListener('click', (e) => {
        if(e.target.closest('[data-remove-img]')) return;
        const item = findItem(el.dataset.thumb);
        if(item && item.image){
          openLightbox(item.image);
        }else{
          pendingImageItemId = el.dataset.thumb;
          document.getElementById('file-input').click();
        }
      });
    });
    document.querySelectorAll('[data-remove-img]').forEach(el => {
      el.addEventListener('click', (e) => {
        e.stopPropagation();
        const item = findItem(el.dataset.removeImg);
        if(item){ delete item.image; render(); scheduleSave(); }
      });
    });
  }

  function openLightbox(src){
    document.getElementById('lightbox-img').src = src;
    document.getElementById('lightbox').classList.add('show');
  }
  function closeLightbox(){
    document.getElementById('lightbox').classList.remove('show');
    document.getElementById('lightbox-img').src = '';
  }

  function findItem(id){
    for(const c of state.categories){
      const it = c.items.find(i => i.id === id);
      if(it) return it;
    }
    return null;
  }

  function compressImage(file){
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onerror = () => reject(new Error('Falha ao ler arquivo'));
      reader.onload = () => {
        const img = new Image();
        img.onerror = () => reject(new Error('Falha ao carregar imagem'));
        img.onload = () => {
          let { width, height } = img;
          if(width > height && width > MAX_IMG_DIM){
            height = Math.round(height * (MAX_IMG_DIM / width));
            width = MAX_IMG_DIM;
          }else if(height > MAX_IMG_DIM){
            width = Math.round(width * (MAX_IMG_DIM / height));
            height = MAX_IMG_DIM;
          }
          const canvas = document.createElement('canvas');
          canvas.width = width; canvas.height = height;
          const ctx = canvas.getContext('2d');
          ctx.drawImage(img, 0, 0, width, height);
          resolve(canvas.toDataURL('image/jpeg', IMG_QUALITY));
        };
        img.src = reader.result;
      };
      reader.readAsDataURL(file);
    });
  }

  function addItem(){
    const nameInput = document.getElementById('item-name');
    const qtyInput = document.getElementById('item-qty');
    const unitInput = document.getElementById('item-unit');
    const catSelect = document.getElementById('item-cat');

    const name = nameInput.value.trim();
    if(!name) { nameInput.focus(); return; }
    const qtyVal = qtyInput.value.trim();
    const unitVal = unitInput.value.trim();
    const qty = [qtyVal, unitVal].filter(Boolean).join(' ');

    const cat = state.categories.find(c => c.id === catSelect.value) || state.categories[0];
    cat.items.unshift({ id: uid(), name, qty, checked: false });

    nameInput.value = '';
    qtyInput.value = '1';
    unitInput.value = '';
    nameInput.focus();

    render();
    scheduleSave();
  }

  function addCategory(){
    const input = document.getElementById('new-cat-name');
    const name = input.value.trim();
    if(!name) return;
    state.categories.push({ id: uid(), name, items: [] });
    input.value = '';
    document.getElementById('new-cat-row').classList.remove('show');
    render();
    scheduleSave();
  }

  function clearChecked(){
    let any = false;
    state.categories.forEach(c => {
      const before = c.items.length;
      c.items = c.items.filter(i => !i.checked);
      if(c.items.length !== before) any = true;
    });
    if(any){ render(); scheduleSave(); }
  }

  function clearAll(){
    const total = state.categories.reduce((sum,c)=>sum+c.items.length,0);
    if(total === 0) return;
    if(!confirm('Tem certeza que deseja apagar todos os itens da lista? Isso afeta todo mundo que usa o link.')) return;
    state.categories.forEach(c => c.items = []);
    render();
    scheduleSave();
  }

  async function init(){
    document.getElementById('date-tag').textContent = formatDate();
    renderQuickAdd();

    firebaseReady = initFirebase();
    state = await loadInitialState();
    render();
    if(firebaseReady){
      setSyncStatus(true, 'sincronizado');
      listenRemote();
    }

    document.getElementById('add-item-btn').addEventListener('click', addItem);
    document.getElementById('item-name').addEventListener('keydown', e => { if(e.key === 'Enter') addItem(); });
    document.getElementById('show-new-cat').addEventListener('click', () => {
      document.getElementById('new-cat-row').classList.toggle('show');
      document.getElementById('new-cat-name').focus();
    });
    document.getElementById('add-cat-btn').addEventListener('click', addCategory);
    document.getElementById('new-cat-name').addEventListener('keydown', e => { if(e.key === 'Enter') addCategory(); });
    document.getElementById('clear-checked-btn').addEventListener('click', clearChecked);
    document.getElementById('clear-all-btn').addEventListener('click', clearAll);
    document.getElementById('lightbox-close').addEventListener('click', closeLightbox);
    document.getElementById('lightbox').addEventListener('click', (e) => { if(e.target.id === 'lightbox') closeLightbox(); });

    document.getElementById('file-input').addEventListener('change', async (e) => {
      const file = e.target.files[0];
      e.target.value = '';
      if(!file || !pendingImageItemId) return;
      const item = findItem(pendingImageItemId);
      if(!item) return;
      try{
        const dataUrl = await compressImage(file);
        item.image = dataUrl;
        render();
        scheduleSave();
      }catch(err){
        console.error(err);
        alert('Não foi possível processar essa imagem.');
      }
      pendingImageItemId = null;
    });
  }

  init();
})();
</script>
</body>
</html>
