<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lista de Compras</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --paper: #EFE3C8;
    --paper-dark: #E4D5AE;
    --chalkboard: #26332A;
    --chalkboard-2: #32412F;
    --ink: #2E2417;
    --ink-soft: #6B5D46;
    --tomato: #B23A2E;
    --tomato-dark: #8F2E24;
    --mustard: #D9A62E;
    --olive: #55643E;
    --line: #C7B48A;
    --chalk: #F3ECD9;
    --radius: 10px;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:
      radial-gradient(ellipse at top left, rgba(255,255,255,0.25), transparent 60%),
      var(--paper);
    background-attachment: fixed;
    color:var(--ink);
    font-family:'Inter', sans-serif;
    min-height:100vh;
    padding-bottom:60px;
  }
  .wrap{
    max-width:980px;
    margin:0 auto;
    padding:0 16px;
  }

  /* HEADER */
  header.board{
    background:linear-gradient(180deg,var(--chalkboard),var(--chalkboard-2));
    padding:22px 0 26px;
    margin-bottom:22px;
    border-bottom:6px solid var(--ink);
    box-shadow:0 4px 0 var(--line);
  }
  header.board .wrap{display:flex; flex-direction:column; gap:10px;}
  .title-row{display:flex; align-items:baseline; justify-content:space-between; flex-wrap:wrap; gap:6px;}
  h1{
    font-family:'Caveat', cursive;
    font-size:2.6rem;
    font-weight:700;
    color:var(--chalk);
    margin:0;
    letter-spacing:0.5px;
    transform:rotate(-1deg);
  }
  .date-tag{
    font-family:'JetBrains Mono', monospace;
    font-size:0.75rem;
    color:var(--mustard);
    background:rgba(0,0,0,0.25);
    padding:4px 10px;
    border-radius:20px;
    border:1px solid rgba(217,166,46,0.4);
  }
  .progress-row{display:flex; align-items:center; gap:12px;}
  .progress-track{
    flex:1;
    height:10px;
    background:rgba(255,255,255,0.12);
    border-radius:20px;
    overflow:hidden;
  }
  .progress-fill{
    height:100%;
    background:linear-gradient(90deg, var(--mustard), #eec564);
    width:0%;
    transition:width 0.35s ease;
    border-radius:20px;
  }
  .progress-label{
    font-family:'JetBrains Mono', monospace;
    font-size:0.78rem;
    color:var(--chalk);
    white-space:nowrap;
  }

  /* ADD BAR */
  .add-bar{
    position:sticky;
    top:0;
    z-index:20;
    background:var(--paper-dark);
    border:1px solid var(--line);
    border-radius:var(--radius);
    padding:12px;
    margin-bottom:20px;
    box-shadow:0 3px 10px rgba(0,0,0,0.08);
  }
  .add-row{
    display:flex;
    gap:8px;
    flex-wrap:wrap;
  }
  .add-row input[type=text], .add-row input[type=number], .add-row select{
    font-family:'Inter',sans-serif;
    font-size:0.92rem;
    padding:9px 10px;
    border:1px solid var(--line);
    border-radius:8px;
    background:var(--paper);
    color:var(--ink);
    outline:none;
  }
  .add-row input[type=text]:focus, .add-row input[type=number]:focus, .add-row select:focus{
    border-color:var(--olive);
    box-shadow:0 0 0 2px rgba(85,100,62,0.18);
  }
  #item-name{flex:1 1 180px; min-width:140px;}
  #item-qty{width:70px; font-family:'JetBrains Mono', monospace;}
  #item-unit{width:80px;}
  #item-cat{flex:0 0 auto; min-width:140px;}
  .btn{
    font-family:'Inter',sans-serif;
    font-weight:600;
    font-size:0.9rem;
    padding:9px 16px;
    border-radius:8px;
    border:none;
    cursor:pointer;
    transition:transform 0.1s ease, filter 0.15s ease;
  }
  .btn:active{transform:scale(0.96);}
  .btn-primary{background:var(--olive); color:var(--chalk);}
  .btn-primary:hover{filter:brightness(1.1);}
  .btn-ghost{
    background:transparent;
    color:var(--ink-soft);
    border:1px dashed var(--line);
  }
  .btn-ghost:hover{color:var(--ink); border-color:var(--ink-soft);}
  .btn-danger{background:var(--tomato); color:var(--chalk);}
  .btn-danger:hover{filter:brightness(1.08);}

  .quick-add{
    margin-top:10px;
    display:flex;
    gap:6px;
    flex-wrap:wrap;
  }
  .chip{
    font-family:'Inter',sans-serif;
    font-size:0.78rem;
    color:var(--ink-soft);
    background:var(--paper);
    border:1px solid var(--line);
    padding:5px 11px;
    border-radius:20px;
    cursor:pointer;
  }
  .chip:hover{background:var(--paper-dark); color:var(--ink);}

  .new-cat-row{display:none; gap:8px; margin-top:10px;}
  .new-cat-row.show{display:flex; flex-wrap:wrap;}

  /* GRID */
  .grid{
    display:grid;
    grid-template-columns:repeat(auto-fill, minmax(280px, 1fr));
    gap:16px;
  }
  .category-card{
    background:var(--paper-dark);
    border:1px solid var(--line);
    border-radius:var(--radius);
    padding:14px 14px 8px;
    border-top:5px solid var(--olive);
    display:flex;
    flex-direction:column;
    min-height:120px;
  }
  .cat-header{
    display:flex;
    align-items:center;
    justify-content:space-between;
    margin-bottom:8px;
  }
  .cat-name{
    font-family:'Caveat', cursive;
    font-size:1.55rem;
    font-weight:700;
    color:var(--ink);
  }
  .cat-count{
    font-family:'JetBrains Mono', monospace;
    font-size:0.72rem;
    color:var(--ink-soft);
    background:var(--paper);
    padding:2px 8px;
    border-radius:20px;
    border:1px solid var(--line);
  }
  .cat-del{
    background:none; border:none; cursor:pointer;
    color:var(--ink-soft); font-size:0.9rem; opacity:0.5;
    margin-left:4px;
  }
  .cat-del:hover{opacity:1; color:var(--tomato);}

  .item-row{
    display:flex;
    align-items:center;
    gap:8px;
    padding:6px 4px;
    border-bottom:1px solid rgba(199,180,138,0.5);
    position:relative;
  }
  .item-row:last-child{border-bottom:none;}
  .checkbox{
    width:22px; height:22px;
    border-radius:50%;
    border:2px solid var(--olive);
    flex:0 0 auto;
    cursor:pointer;
    display:flex; align-items:center; justify-content:center;
    background:var(--paper);
  }
  .checkbox svg{width:13px; height:13px; opacity:0; transition:opacity 0.15s;}
  .item-row.checked .checkbox{background:var(--olive);}
  .item-row.checked .checkbox svg{opacity:1;}
  .item-name{
    flex:1;
    font-size:0.94rem;
    border:none;
    background:transparent;
    color:var(--ink);
    padding:4px 2px;
    font-family:'Inter',sans-serif;
    outline:none;
    min-width:0;
  }
  .item-row.checked .item-name{
    text-decoration:line-through;
    color:var(--ink-soft);
  }
  .item-qty{
    width:52px;
    font-family:'JetBrains Mono', monospace;
    font-size:0.8rem;
    text-align:center;
    border:1px solid transparent;
    background:transparent;
    color:var(--ink-soft);
    border-radius:6px;
    padding:3px 2px;
    outline:none;
  }
  .item-qty:focus{border-color:var(--line); background:var(--paper);}
  .item-del{
    background:none; border:none; cursor:pointer;
    color:var(--ink-soft); opacity:0.4; font-size:1rem;
    flex:0 0 auto; line-height:1;
  }
  .item-del:hover{opacity:1; color:var(--tomato);}

  .stamp{
    position:absolute;
    right:34px;
    font-family:'JetBrains Mono', monospace;
    font-weight:700;
    font-size:0.62rem;
    letter-spacing:1px;
    color:var(--tomato);
    border:2px solid var(--tomato);
    border-radius:4px;
    padding:1px 5px;
    transform:rotate(-8deg) scale(0);
    opacity:0;
    pointer-events:none;
    background:rgba(178,58,46,0.06);
    transition:transform 0.25s cubic-bezier(.34,1.56,.64,1), opacity 0.2s;
  }
  .item-row.checked .stamp{
    transform:rotate(-8deg) scale(1);
    opacity:0.85;
  }

  .empty-cat{
    font-size:0.82rem;
    color:var(--ink-soft);
    font-style:italic;
    padding:10px 4px;
    opacity:0.7;
  }

  /* FOOTER */
  .footer-bar{
    max-width:980px;
    margin:26px auto 0;
    padding:14px 16px 0;
    display:flex;
    justify-content:space-between;
    align-items:center;
    flex-wrap:wrap;
    gap:10px;
    border-top:2px dashed var(--line);
  }
  .receipt-total{
    font-family:'JetBrains Mono', monospace;
    font-size:0.85rem;
    color:var(--ink-soft);
  }
  .receipt-total b{color:var(--ink);}
  .footer-actions{display:flex; gap:8px; flex-wrap:wrap;}

  .save-indicator{
    position:fixed;
    bottom:16px;
    right:16px;
    font-family:'JetBrains Mono', monospace;
    font-size:0.72rem;
    color:var(--chalk);
    background:var(--chalkboard);
    padding:6px 12px;
    border-radius:20px;
    opacity:0;
    transform:translateY(6px);
    transition:opacity 0.25s, transform 0.25s;
    pointer-events:none;
  }
  .save-indicator.show{opacity:0.92; transform:translateY(0);}

  .loading-state{
    text-align:center;
    padding:60px 20px;
    color:var(--ink-soft);
    font-family:'Inter',sans-serif;
  }

  /* MOBILE */
  @media (max-width:640px){
    h1{font-size:2.1rem;}
    .add-bar{padding:10px;}
    #item-cat{min-width:100%;}
    #item-name{min-width:100%;}
    .grid{grid-template-columns:1fr;}
    .footer-bar{flex-direction:column; align-items:flex-start;}
  }
</style>
</head>
<body>

<header class="board">
  <div class="wrap">
    <div class="title-row">
      <h1>Lista de Compras</h1>
      <span class="date-tag" id="date-tag"></span>
    </div>
    <div class="progress-row">
      <div class="progress-track"><div class="progress-fill" id="progress-fill"></div></div>
      <span class="progress-label" id="progress-label">0 / 0</span>
    </div>
  </div>
</header>

<div class="wrap">

  <div class="add-bar">
    <div class="add-row">
      <input type="text" id="item-name" placeholder="Nome do item (ex: tomate)" maxlength="60">
      <input type="number" id="item-qty" placeholder="Qtd" min="0" step="1" value="1">
      <input type="text" id="item-unit" placeholder="un/kg/L" maxlength="8">
      <select id="item-cat"></select>
      <button class="btn btn-primary" id="add-item-btn">+ Adicionar</button>
    </div>
    <div class="quick-add" id="quick-add"></div>
    <div style="margin-top:10px;">
      <button class="btn btn-ghost" id="show-new-cat">+ Nova categoria</button>
    </div>
    <div class="new-cat-row" id="new-cat-row">
      <input type="text" id="new-cat-name" placeholder="Nome da categoria" maxlength="30">
      <button class="btn btn-primary" id="add-cat-btn">Criar</button>
    </div>
  </div>

  <div id="content">
    <div class="loading-state">Carregando sua lista…</div>
  </div>

</div>

<div class="footer-bar">
  <div class="receipt-total" id="receipt-total"></div>
  <div class="footer-actions">
    <button class="btn btn-ghost" id="clear-checked-btn">Limpar comprados</button>
    <button class="btn btn-danger" id="clear-all-btn">Limpar tudo</button>
  </div>
</div>

<div class="save-indicator" id="save-indicator">salvo ✓</div>

<script>
(function(){
  const STORAGE_KEY = 'grocery-list-v1';
  const DEFAULT_CATEGORIES = ['Hortifruti','Açougue','Padaria','Laticínios','Mercearia','Bebidas','Limpeza','Higiene','Outros'];
  const QUICK_ADD = ['Arroz','Feijão','Leite','Ovos','Pão','Café','Açúcar','Óleo','Papel higiênico','Detergente','Banana','Frango'];
  const CAT_COLORS = ['#55643E','#B23A2E','#D9A62E','#3E6B63','#6B4A63','#46586B','#8A6D3B','#4C6444','#7A4A3A'];

  let state = null;
  let saveTimer = null;

  function uid(){ return Date.now().toString(36) + Math.random().toString(36).slice(2,7); }

  function defaultState(){
    return {
      categories: DEFAULT_CATEGORIES.map(name => ({ id: uid(), name, items: [] }))
    };
  }

  // Usa o armazenamento do Claude quando disponível (dentro do chat);
  // se o arquivo for aberto direto no navegador, usa localStorage como alternativa.
  const hasClaudeStorage = typeof window.storage !== 'undefined' && window.storage;

  async function loadState(){
    try{
      if(hasClaudeStorage){
        const res = await window.storage.get(STORAGE_KEY, false);
        if(res && res.value) return JSON.parse(res.value);
        return defaultState();
      }else{
        const raw = localStorage.getItem(STORAGE_KEY);
        return raw ? JSON.parse(raw) : defaultState();
      }
    }catch(e){
      return defaultState();
    }
  }

  function scheduleSave(){
    const indicator = document.getElementById('save-indicator');
    clearTimeout(saveTimer);
    saveTimer = setTimeout(async () => {
      try{
        if(hasClaudeStorage){
          await window.storage.set(STORAGE_KEY, JSON.stringify(state), false);
        }else{
          localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
        }
        indicator.classList.add('show');
        setTimeout(()=>indicator.classList.remove('show'), 1200);
      }catch(e){
        console.error('Erro ao salvar', e);
      }
    }, 350);
  }

  function catColor(index){ return CAT_COLORS[index % CAT_COLORS.length]; }

  function formatDate(){
    const d = new Date();
    return d.toLocaleDateString('pt-BR', { weekday:'short', day:'2-digit', month:'short' });
  }

  function populateCatSelect(){
    const sel = document.getElementById('item-cat');
    sel.innerHTML = state.categories.map(c => `<option value="${c.id}">${escapeHtml(c.name)}</option>`).join('');
  }

  function escapeHtml(str){
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  function renderQuickAdd(){
    const el = document.getElementById('quick-add');
    el.innerHTML = QUICK_ADD.map(name => `<span class="chip" data-name="${escapeHtml(name)}">${escapeHtml(name)}</span>`).join('');
    el.querySelectorAll('.chip').forEach(chip => {
      chip.addEventListener('click', () => {
        document.getElementById('item-name').value = chip.dataset.name;
        document.getElementById('item-name').focus();
      });
    });
  }

  function render(){
    populateCatSelect();

    const content = document.getElementById('content');
    let totalItems = 0, checkedItems = 0;
    state.categories.forEach(c => { totalItems += c.items.length; checkedItems += c.items.filter(i=>i.checked).length; });

    document.getElementById('progress-label').textContent = `${checkedItems} / ${totalItems}`;
    document.getElementById('progress-fill').style.width = totalItems ? `${(checkedItems/totalItems)*100}%` : '0%';
    document.getElementById('receipt-total').innerHTML = totalItems
      ? `<b>${totalItems - checkedItems}</b> item(ns) restante(s) de <b>${totalItems}</b> no total`
      : 'Sua lista está vazia. Adicione o primeiro item acima.';

    if(state.categories.length === 0){
      content.innerHTML = '<div class="loading-state">Nenhuma categoria ainda. Crie uma acima.</div>';
      return;
    }

    content.innerHTML = `<div class="grid">${state.categories.map((cat, idx) => `
      <div class="category-card" style="border-top-color:${catColor(idx)}" data-cat-id="${cat.id}">
        <div class="cat-header">
          <span class="cat-name">${escapeHtml(cat.name)}</span>
          <span style="display:flex; align-items:center;">
            <span class="cat-count">${cat.items.filter(i=>i.checked).length}/${cat.items.length}</span>
            <button class="cat-del" data-del-cat="${cat.id}" title="Excluir categoria">✕</button>
          </span>
        </div>
        ${cat.items.length === 0
          ? '<div class="empty-cat">Nenhum item aqui ainda.</div>'
          : cat.items.map(item => `
            <div class="item-row ${item.checked ? 'checked' : ''}" data-item-id="${item.id}">
              <div class="checkbox" data-toggle="${item.id}">
                <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
              </div>
              <input type="text" class="item-name" value="${escapeHtml(item.name)}" data-edit-name="${item.id}">
              <span class="stamp">OK</span>
              <input type="text" class="item-qty" value="${escapeHtml(item.qty || '')}" placeholder="qtd" data-edit-qty="${item.id}">
              <button class="item-del" data-del-item="${item.id}" title="Remover item">✕</button>
            </div>
          `).join('')
        }
      </div>
    `).join('')}</div>`;

    attachRowEvents();
  }

  function attachRowEvents(){
    document.querySelectorAll('[data-toggle]').forEach(el => {
      el.addEventListener('click', () => {
        const id = el.dataset.toggle;
        const item = findItem(id);
        if(item){ item.checked = !item.checked; render(); scheduleSave(); }
      });
    });
    document.querySelectorAll('[data-edit-name]').forEach(el => {
      el.addEventListener('change', () => {
        const item = findItem(el.dataset.editName);
        if(item){ item.name = el.value.trim() || item.name; scheduleSave(); }
      });
    });
    document.querySelectorAll('[data-edit-qty]').forEach(el => {
      el.addEventListener('change', () => {
        const item = findItem(el.dataset.editQty);
        if(item){ item.qty = el.value.trim(); scheduleSave(); }
      });
    });
    document.querySelectorAll('[data-del-item]').forEach(el => {
      el.addEventListener('click', () => {
        const id = el.dataset.delItem;
        state.categories.forEach(c => { c.items = c.items.filter(i => i.id !== id); });
        render(); scheduleSave();
      });
    });
    document.querySelectorAll('[data-del-cat]').forEach(el => {
      el.addEventListener('click', () => {
        const id = el.dataset.delCat;
        const cat = state.categories.find(c => c.id === id);
        if(cat && cat.items.length > 0){
          if(!confirm(`A categoria "${cat.name}" tem ${cat.items.length} item(ns). Excluir mesmo assim?`)) return;
        }
        state.categories = state.categories.filter(c => c.id !== id);
        render(); scheduleSave();
      });
    });
  }

  function findItem(id){
    for(const c of state.categories){
      const it = c.items.find(i => i.id === id);
      if(it) return it;
    }
    return null;
  }

  function addItem(){
    const nameInput = document.getElementById('item-name');
    const qtyInput = document.getElementById('item-qty');
    const unitInput = document.getElementById('item-unit');
    const catSelect = document.getElementById('item-cat');

    const name = nameInput.value.trim();
    if(!name) { nameInput.focus(); return; }
    const qtyVal = qtyInput.value.trim();
    const unitVal = unitInput.value.trim();
    const qty = [qtyVal, unitVal].filter(Boolean).join(' ');

    const cat = state.categories.find(c => c.id === catSelect.value) || state.categories[0];
    cat.items.unshift({ id: uid(), name, qty, checked: false });

    nameInput.value = '';
    qtyInput.value = '1';
    unitInput.value = '';
    nameInput.focus();

    render();
    scheduleSave();
  }

  function addCategory(){
    const input = document.getElementById('new-cat-name');
    const name = input.value.trim();
    if(!name) return;
    state.categories.push({ id: uid(), name, items: [] });
    input.value = '';
    document.getElementById('new-cat-row').classList.remove('show');
    render();
    scheduleSave();
  }

  function clearChecked(){
    let any = false;
    state.categories.forEach(c => {
      const before = c.items.length;
      c.items = c.items.filter(i => !i.checked);
      if(c.items.length !== before) any = true;
    });
    if(any){ render(); scheduleSave(); }
  }

  function clearAll(){
    const total = state.categories.reduce((sum,c)=>sum+c.items.length,0);
    if(total === 0) return;
    if(!confirm('Tem certeza que deseja apagar todos os itens da lista?')) return;
    state.categories.forEach(c => c.items = []);
    render();
    scheduleSave();
  }

  async function init(){
    document.getElementById('date-tag').textContent = formatDate();
    renderQuickAdd();
    state = await loadState();
    render();

    document.getElementById('add-item-btn').addEventListener('click', addItem);
    document.getElementById('item-name').addEventListener('keydown', e => { if(e.key === 'Enter') addItem(); });
    document.getElementById('show-new-cat').addEventListener('click', () => {
      document.getElementById('new-cat-row').classList.toggle('show');
      document.getElementById('new-cat-name').focus();
    });
    document.getElementById('add-cat-btn').addEventListener('click', addCategory);
    document.getElementById('new-cat-name').addEventListener('keydown', e => { if(e.key === 'Enter') addCategory(); });
    document.getElementById('clear-checked-btn').addEventListener('click', clearChecked);
    document.getElementById('clear-all-btn').addEventListener('click', clearAll);
  }

  init();
})();
</script>
</body>
</html>
